<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ปฏิทินวันลา</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F5FB;
    --paper:#FFFFFF;
    --ink:#22273A;
    --muted:#6B7590;
    --border:#E3E8F3;
    --accent:#12B5A6;
    --accent-dark:#0D8F84;
    --accent-soft:#D8F7F1;
    --accent2:#FF7A59;
    --accent2-soft:#FFE3DA;
    --sun:#FFC24B;
    --sun-soft:#FFF1D6;
    --danger:#F0503B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 10% 0%, #E7F9F5 0%, transparent 45%),
      radial-gradient(circle at 90% 10%, #FFEFE4 0%, transparent 40%),
      var(--bg);
    color:var(--ink);
    font-family:'Sarabun',sans-serif;
    min-height:100vh;
    padding:28px 16px 60px;
  }
  h1,h2,h3,.display{
    font-family:'Kanit',sans-serif;
    margin:0;
  }
  .wrap{
    max-width:1320px;
    margin:0 auto;
  }
  header.top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:22px;
  }
  header.top h1{
    font-size:27px;
    font-weight:700;
    background:linear-gradient(100deg, var(--accent-dark), var(--accent), var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  header.top p{
    margin:4px 0 0;
    color:var(--muted);
    font-size:14px;
  }
  .layout{
    display:grid;
    grid-template-columns:260px 1fr;
    gap:20px;
    align-items:start;
  }
  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
  }
  .panel{
    background:var(--paper);
    border:1px solid var(--border);
    border-top:4px solid var(--accent);
    border-radius:14px;
    padding:18px;
    box-shadow:0 6px 18px rgba(34,39,58,0.05);
  }
  .panel h3{
    font-size:16px;
    font-weight:600;
    margin-bottom:14px;
    color:var(--ink);
  }
  label{
    display:block;
    font-size:13px;
    color:var(--muted);
    margin:12px 0 5px;
  }
  select, input, textarea{
    width:100%;
    min-width:0;
    padding:9px 10px;
    border-radius:9px;
    border:1.5px solid var(--border);
    font-family:'Sarabun',sans-serif;
    font-size:14px;
    color:var(--ink);
    background:#FBFCFF;
    position:relative;
    z-index:1;
  }
  select:focus, input:focus, textarea:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
    border-color:var(--accent);
  }
  input[type="date"]{
    min-height:40px;
    -webkit-appearance:none;
    appearance:none;
  }
  input[type="date"]::-webkit-calendar-picker-indicator{
    cursor:pointer;
    padding:2px;
    margin-left:4px;
    filter:invert(46%) sepia(59%) saturate(508%) hue-rotate(126deg) brightness(92%) contrast(93%);
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media (max-width:420px){
    .row2{grid-template-columns:1fr;}
  }
  textarea{resize:vertical;min-height:50px;}
  button.primary{
    margin-top:16px;
    width:100%;
    background:linear-gradient(135deg, var(--accent), var(--accent-dark));
    color:#fff;
    border:none;
    padding:11px 14px;
    border-radius:10px;
    font-family:'Kanit',sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    box-shadow:0 6px 14px rgba(18,181,166,0.35);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  button.primary:hover{transform:translateY(-1px); box-shadow:0 8px 18px rgba(18,181,166,0.45);}
  button.primary:active{transform:translateY(0);}
  .error-msg{
    color:var(--danger);
    font-size:13px;
    margin-top:8px;
    display:none;
  }
  .legend{
    margin-top:18px;
    padding-top:14px;
    border-top:1px dashed var(--border);
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    margin-bottom:7px;
    padding:5px 9px;
    border-radius:20px;
    background:#F6F8FD;
    color:var(--ink);
  }
  .dot{
    width:11px;height:11px;border-radius:50%;flex:none;
    box-shadow:0 0 0 3px rgba(0,0,0,0.04);
  }

  /* detail box */
  .day-detail{
    margin-top:16px;
    padding:14px;
    border-radius:10px;
    background:var(--accent-soft);
    display:none;
  }
  .day-detail h4{
    font-family:'Kanit',sans-serif;
    font-size:14px;
    margin:0 0 8px;
    color:var(--accent-dark);
  }
  .detail-entry{
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border-radius:8px;
    padding:7px 9px;
    margin-bottom:6px;
    font-size:13px;
  }
  .detail-entry .info{flex:1;}
  .detail-entry .del{
    border:none;background:none;color:var(--danger);
    cursor:pointer;font-size:16px;line-height:1;
  }

  /* list of all leaves */
  .list-panel{
    margin-top:20px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
  }
  th,td{
    text-align:left;
    padding:9px 8px;
    border-bottom:1px solid var(--border);
  }
  th{
    color:var(--muted);
    font-weight:600;
    font-size:12px;
  }
  .name-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .empty-note{
    color:var(--muted);
    font-size:13px;
    padding:14px 2px;
  }
  .del-row{
    border:none;background:none;color:var(--danger);cursor:pointer;font-size:15px;
  }
  .list-panel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:14px;
  }
  .list-panel-head h3{margin-bottom:0;}
  .sync-badge{
    font-size:11.5px;
    padding:4px 10px;
    border-radius:20px;
    background:var(--accent-soft);
    color:var(--accent-dark);
    white-space:nowrap;
    font-weight:600;
    cursor:pointer;
  }
  .sync-badge.err{background:var(--accent2-soft); color:#B5482F;}
  .backup-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:16px;
    padding-top:14px;
    border-top:1px dashed var(--border);
  }
  .backup-btn{
    flex:1;
    min-width:150px;
    background:#F6F8FD;
    color:var(--accent-dark);
    border:1px solid var(--border);
    border-radius:9px;
    padding:8px 10px;
    font-family:'Kanit',sans-serif;
    font-weight:600;
    font-size:12.5px;
    cursor:pointer;
  }
  .backup-btn:hover{background:var(--accent-soft);}

  .storage-note{
    font-size:12px;
    color:var(--muted);
    margin-top:10px;
    text-align:center;
  }

  /* name multi-select checkboxes */
  .name-checks{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
  }
  .name-check{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13.5px;
    padding:6px 7px;
    border-radius:7px;
    border:1px solid var(--border);
    cursor:pointer;
    background:#FBFCFB;
    user-select:none;
  }
  .name-check input{width:auto;margin:0;}
  .name-check.checked{
    border-color:var(--accent);
    background:var(--accent-soft);
  }

  /* date mode radios */
  .mode-tabs{
    display:flex;
    gap:6px;
    margin-top:6px;
  }
  .mode-tab{
    flex:1;
    text-align:center;
    font-size:12px;
    padding:7px 4px;
    border-radius:7px;
    border:1px solid var(--border);
    cursor:pointer;
    color:var(--muted);
    background:#FBFCFB;
  }
  .mode-tab.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
    font-weight:600;
  }
  .date-mode-panel{display:none;}
  .date-mode-panel.active{display:block;}
  .add-date-row{
    display:flex;
    gap:8px;
    align-items:flex-end;
  }
  .add-date-row input{flex:1;}
  .add-date-row button{
    flex:none;
    background:var(--accent-soft);
    color:var(--accent-dark);
    border:none;
    border-radius:8px;
    padding:8px 12px;
    font-family:'Kanit',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .add-date-row button:hover{background:var(--accent);color:#fff;}
  .date-chips{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
  }
  .date-chip{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--accent-soft);
    color:var(--accent-dark);
    font-size:12.5px;
    padding:4px 6px 4px 10px;
    border-radius:14px;
  }
  .date-chip button{
    border:none;background:none;color:var(--accent-dark);
    cursor:pointer;font-size:13px;line-height:1;padding:2px;
  }

  /* time period */
  #f-time-custom{margin-top:8px;}

  /* ===== single-month calendar ===== */
  .months-wrap{
    position:relative;
    padding-top:34px;
  }
  .rings{
    position:absolute;
    top:-12px;left:0;right:0;
    display:flex;
    justify-content:space-evenly;
    padding:0 30px;
    pointer-events:none;
    z-index:0;
  }
  .ring{
    width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, var(--accent-soft) 60%, var(--accent) 100%);
    border:3px solid var(--bg);
  }
  .nav-btns{display:flex;gap:6px;}
  .nav-btns button{
    background:var(--accent-soft);
    color:var(--accent-dark);
    border:none;
    width:32px;height:32px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    font-family:'Kanit',sans-serif;
  }
  .nav-btns button:hover{background:var(--accent);color:#fff;}
  .months-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    flex-wrap:wrap;
    gap:10px;
  }
  .months-head .range-title{
    font-size:19px;
    font-weight:700;
    color:var(--accent-dark);
  }
  .months-row{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
  }
  .month-card{
    background:var(--paper);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
  }
  .month-card .m-title{
    font-size:14.5px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:10px;
    text-align:center;
  }
  .m-weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    margin-bottom:4px;
  }
  .m-weekdays div{
    text-align:center;
    font-size:11.5px;
    color:var(--muted);
    font-weight:600;
  }
  .m-weekdays div.sun{color:var(--accent2);}
  .m-weekdays div.sat{color:#5B7DB1;}
  .m-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
  }
  .m-day{
    min-height:78px;
    border-radius:7px;
    border:1px solid transparent;
    padding:4px 4px 3px;
    cursor:pointer;
    background:#FCFDFC;
    display:flex;
    flex-direction:column;
    gap:2px;
    transition:box-shadow .12s ease;
    overflow:hidden;
  }
  .m-day:hover{box-shadow:0 0 0 2px var(--accent-soft) inset;}
  .m-day.outside{opacity:.35;}
  .m-day.today{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft) inset;}
  .m-day.holiday{background:var(--sun-soft);}
  .m-day .m-num{
    font-size:12px;
    font-weight:600;
    color:var(--ink);
  }
  .m-day.sunday .m-num{color:var(--accent2);}
  .m-day.saturday .m-num{color:#5B7DB1;}
  .m-day.holiday .m-num{color:#D9791A;}
  .m-entries{
    display:flex;
    flex-direction:column;
    gap:1px;
    width:100%;
  }
  .m-entry{
    display:flex;
    align-items:center;
    gap:3px;
    overflow:hidden;
  }
  .m-entry .dot-inline{
    width:6px;height:6px;border-radius:50%;flex:none;
  }
  .m-entry-name{
    font-size:10px;
    line-height:1.2;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .m-more{font-size:9.5px;color:var(--muted);margin-top:1px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>ปฏิทินวันลา</h1>
      <p>บันทึกและดูวันลาของทีมได้ในที่เดียว</p>
    </div>
  </header>

  <div class="layout">
    <div>
      <div class="panel">
        <h3>เพิ่มวันลา</h3>
        <label>ชื่อ (เลือกได้มากกว่า 1 คน)</label>
        <div class="name-checks" id="name-checks"></div>

        <label>รูปแบบวันที่</label>
        <div class="mode-tabs" id="mode-tabs">
          <div class="mode-tab active" data-mode="single">วันเดียว</div>
          <div class="mode-tab" data-mode="range">ช่วงวันที่ต่อเนื่อง</div>
          <div class="mode-tab" data-mode="multi">หลายวันไม่ติดกัน</div>
        </div>

        <div class="date-mode-panel active" id="mode-single">
          <label for="f-single-date">วันที่ลา</label>
          <input type="date" id="f-single-date">
        </div>

        <div class="date-mode-panel" id="mode-range">
          <div class="row2">
            <div>
              <label for="f-start">วันที่เริ่ม</label>
              <input type="date" id="f-start">
            </div>
            <div>
              <label for="f-end">วันที่สิ้นสุด</label>
              <input type="date" id="f-end">
            </div>
          </div>
        </div>

        <div class="date-mode-panel" id="mode-multi">
          <label for="f-multi-date">เพิ่มวันที่ทีละวัน</label>
          <div class="add-date-row">
            <input type="date" id="f-multi-date">
            <button type="button" id="btn-add-date">+ เพิ่ม</button>
          </div>
          <div class="date-chips" id="date-chips"></div>
        </div>

        <label for="f-type">ประเภทการลา</label>
        <select id="f-type">
          <option>ลาป่วย</option>
          <option>ลากิจ</option>
          <option>ลาพักร้อน</option>
          <option>ประชุม</option>
          <option>อื่นๆ</option>
        </select>

        <label for="f-period">ช่วงเวลา</label>
        <select id="f-period">
          <option value="เต็มวัน">เต็มวัน</option>
          <option value="เช้า">ครึ่งวันเช้า</option>
          <option value="บ่าย">ครึ่งวันบ่าย</option>
          <option value="custom">กำหนดเอง...</option>
        </select>
        <input type="text" id="f-period-custom" placeholder="เช่น 13:00 - 15:00" style="display:none;">

        <label for="f-note">หมายเหตุ (ถ้ามี)</label>
        <textarea id="f-note" placeholder="เช่น ลาไปธุระที่ต่างจังหวัด"></textarea>

        <div class="error-msg" id="err"></div>
        <button class="primary" id="btn-save">บันทึกวันลา</button>

        <div class="legend" id="legend"></div>
      </div>
      <div class="storage-note">ข้อมูลนี้จัดเก็บไว้ส่วนกลาง เปิดจากเครื่องไหน เมื่อไหร่ก็เห็นข้อมูลเดิม (แนะนำกดสำรองข้อมูลเก็บไว้เป็นระยะ)</div>
    </div>

    <div>
      <div class="months-wrap">
        <div class="rings">
          <div class="ring"></div><div class="ring"></div><div class="ring"></div>
          <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        </div>
        <div class="months-head">
          <div class="range-title" id="range-title"></div>
          <div class="nav-btns">
            <button id="prev-month">‹</button>
            <button id="today-btn" style="font-size:12px;">วันนี้</button>
            <button id="next-month">›</button>
          </div>
        </div>
        <div class="months-row" id="months-row"></div>

        <div class="day-detail" id="day-detail">
          <h4 id="detail-title"></h4>
          <div id="detail-list"></div>
        </div>
      </div>

      <div class="panel list-panel">
        <div class="list-panel-head">
          <h3>รายการวันลาทั้งหมด</h3>
          <span class="sync-badge" id="sync-badge">กำลังซิงก์...</span>
        </div>
        <div id="list-wrap"></div>
        <div class="backup-row">
          <button type="button" class="backup-btn" id="btn-export">⬇ สำรองข้อมูล (.json)</button>
          <button type="button" class="backup-btn" id="btn-import-trigger">⬆ นำเข้าไฟล์สำรอง</button>
          <input type="file" id="file-import" accept="application/json" style="display:none;">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// วาง Web app URL จาก Google Apps Script deployment ตรงนี้ (ดูวิธีขอ URL ได้จากคำแนะนำที่ให้ไว้)
// ถ้ายังไม่ได้ตั้งค่า ระบบจะใช้ storage ภายในเป็นหลักไปก่อน
// หมายเหตุ: หน้าเว็บนี้รันอยู่ใน Claude artifact ซึ่งไม่อนุญาตให้เรียก API ภายนอกโดยตรง (เช่น Google Apps Script)
// จึงใช้ window.storage (ระบบเก็บข้อมูลถาวรของ artifact เอง) เป็นแหล่งข้อมูลหลักแทน ซึ่งจะคงข้อมูลไว้
// ไม่ว่าจะเปิดจากเครื่องไหนหรือปิดเปิดใหม่กี่ครั้งก็ตาม ตราบใดที่เปิดผ่านลิงก์ artifact เดียวกันนี้
const SHEET_WEB_APP_URL = '';

const PEOPLE = {
  "แอ๋ม": { dot:"#E63946" },
  "เพ็ญ": { dot:"#FFB300" },
  "แปง":  { dot:"#16A34A" },
  "กิ้ม": { dot:"#1D4ED8" },
  "หลิว": { dot:"#9333EA" },
  "เบิด": { dot:"#F97316" }
};
const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
  "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const THAI_DAYS = ["อา","จ","อ","พ","พฤ","ศ","ส"];

// Thai official public holidays. Currently covers 2026 (พ.ศ. 2569) accurately;
// years without an entry will show weekends shaded but no holiday tint.
const HOLIDAYS = {
  "2026-01-01": "วันขึ้นปีใหม่",
  "2026-01-02": "วันหยุดพิเศษ (มติ ครม.)",
  "2026-03-03": "วันมาฆบูชา",
  "2026-04-06": "วันจักรี",
  "2026-04-13": "วันสงกรานต์",
  "2026-04-14": "วันสงกรานต์",
  "2026-04-15": "วันสงกรานต์",
  "2026-05-01": "วันแรงงานแห่งชาติ",
  "2026-05-04": "วันฉัตรมงคล",
  "2026-05-13": "วันพืชมงคล",
  "2026-05-31": "วันวิสาขบูชา",
  "2026-06-01": "ชดเชยวันวิสาขบูชา",
  "2026-06-03": "วันเฉลิมพระชนมพรรษาพระราชินี",
  "2026-07-28": "วันเฉลิมพระชนมพรรษา ร.10",

let leaves = [];
let viewDate = new Date();
viewDate.setDate(1);
let selectedDayISO = null;
let dateMode = 'single';
let multiDates = [];

const pad = n => String(n).padStart(2,'0');
const toISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseISO = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };

function populateNameSelect(){
  const wrap = document.getElementById('name-checks');
  wrap.innerHTML = Object.keys(PEOPLE).map(n=>
    `<label class="name-check" data-name="${n}">
      <input type="checkbox" value="${n}"> ${n}
    </label>`
  ).join('');
  wrap.querySelectorAll('.name-check').forEach(el=>{
    const cb = el.querySelector('input');
    cb.addEventListener('change', ()=> el.classList.toggle('checked', cb.checked));
  });
}

function getSelectedNames(){
  return Array.from(document.querySelectorAll('#name-checks input:checked')).map(cb=>cb.value);
}

function setupPeriodField(){
  const sel = document.getElementById('f-period');
  const custom = document.getElementById('f-period-custom');
  sel.addEventListener('change', ()=>{
    custom.style.display = sel.value === 'custom' ? 'block' : 'none';
  });
}

function setupModeTabs(){
  document.querySelectorAll('.mode-tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      dateMode = tab.dataset.mode;
      document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active', t===tab));
      document.getElementById('mode-single').classList.toggle('active', dateMode==='single');
      document.getElementById('mode-range').classList.toggle('active', dateMode==='range');
      document.getElementById('mode-multi').classList.toggle('active', dateMode==='multi');
    });
  });
}

function renderDateChips(){
  const wrap = document.getElementById('date-chips');
  wrap.innerHTML = multiDates.map((d,i)=>
    `<span class="date-chip">${d}<button type="button" data-i="${i}">✕</button></span>`
  ).join('');
  wrap.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      multiDates.splice(Number(btn.dataset.i),1);
      renderDateChips();
    });
  });
}

document.getElementById('btn-add-date').addEventListener('click', ()=>{
  const val = document.getElementById('f-multi-date').value;
  if(val && !multiDates.includes(val)){
    multiDates.push(val);
    multiDates.sort();
    renderDateChips();
    document.getElementById('f-multi-date').value = '';
  }
});

function renderLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = Object.entries(PEOPLE).map(([name,c])=>
    `<div class="legend-item"><span class="dot" style="background:${c.dot}"></span>${name}</div>`
  ).join('');
}

let lastSyncDetail = '';

function setSyncBadge(state, detail){
  const el = document.getElementById('sync-badge');
  if(detail !== undefined) lastSyncDetail = detail;
  if(!el) return;
  if(state === 'ok'){
    el.textContent = '☁ ซิงก์กับ Google Sheet แล้ว';
    el.classList.remove('err');
  } else if(state === 'saving'){
    el.textContent = 'กำลังบันทึก...';
    el.classList.remove('err');
  } else if(state === 'local'){
    el.textContent = '☁ บันทึกถาวรแล้ว (เห็นได้ทุกเครื่อง)';
    el.classList.remove('err');
  } else {
    el.textContent = '⚠ เชื่อมต่อ Sheet ไม่สำเร็จ (แตะเพื่อดูรายละเอียด)';
    el.classList.add('err');
  }
}

document.getElementById('sync-badge').addEventListener('click', ()=>{
  if(lastSyncDetail){
    alert('รายละเอียด:\n' + lastSyncDetail);
  } else {
    alert('เชื่อมต่อกับ Google Sheet เรียบร้อยดี ไม่มีข้อผิดพลาด');
  }
});

function sheetRowToLeave(r){
  return {
    id: String(r.id),
    name: r.name,
    start: r.start,
    end: r.end,
    type: r.type,
    period: r.period,
    note: r.note || ''
  };
}

// ดึง response ออกมาเป็นข้อความสำหรับวิเคราะห์ปัญหา และตรวจว่าเป็น JSON จริงหรือหน้า HTML
// (เช่น หน้ายืนยันสิทธิ์ของ Google ที่ขึ้นมาแทนข้อมูลจริง เมื่อ deploy ตั้งสิทธิ์การเข้าถึงไม่ถูกต้อง)
async function parseSheetResponse(resp){
  const text = await resp.text();
  const trimmed = text.trim();
  if(trimmed.startsWith('<')){
    throw new Error('Sheet ตอบกลับเป็นหน้า HTML แทนข้อมูล JSON (มักเกิดจากตั้งค่า "Who has access" ตอน Deploy ไม่ได้เป็น "Anyone" หรือยังไม่ได้ Authorize) รายละเอียด: ' + trimmed.slice(0,150));
  }
  try{
    return JSON.parse(trimmed);
  }catch(e){
    throw new Error('แปลงข้อมูลจาก Sheet เป็น JSON ไม่ได้: ' + trimmed.slice(0,150));
  }
}

async function loadLeaves(){
  // เก็บสำเนาจาก storage ไว้ก่อนเป็นค่าเริ่มต้น/สำรอง
  let localCopy = [];
  try{
    const res = await window.storage.get('leaves', true);
    localCopy = res ? JSON.parse(res.value) : [];
  }catch(e){
    localCopy = [];
  }

  if(!SHEET_WEB_APP_URL){
    leaves = localCopy;
    setSyncBadge('local');
    return;
  }

  try{
    const resp = await fetch(SHEET_WEB_APP_URL, { method:'GET' });
    if(!resp.ok){
      const bodyText = await resp.text().catch(()=> '');
      throw new Error(`HTTP ${resp.status} ${resp.statusText} — ${bodyText.slice(0,150)}`);
    }
    const rows = await parseSheetResponse(resp);
    if(!Array.isArray(rows)) throw new Error('รูปแบบข้อมูลจาก Sheet ไม่ใช่ list ตามที่คาดไว้');
    leaves = rows.map(sheetRowToLeave);
    setSyncBadge('ok', '');
    // อัปเดตสำเนาในเครื่องให้ตรงกับ Sheet ไว้เป็นสำรอง
    window.storage.set('leaves', JSON.stringify(leaves), true).catch(()=>{});
  }catch(e){
    console.error('ดึงข้อมูลจาก Sheet ไม่สำเร็จ ใช้ข้อมูลสำรองในเครื่องแทน', e);
    leaves = localCopy;
    setSyncBadge('err', String(e.message || e));
  }
}

async function saveLeaves(){
  setSyncBadge('saving');

  // บันทึกสำเนาในเครื่องไว้ก่อนเสมอ (กันข้อมูลหายถ้า Sheet ต่อไม่ติด)
  let localOk = false;
  try{
    const result = await window.storage.set('leaves', JSON.stringify(leaves), true);
    localOk = !!result;
  }catch(e){
    localOk = false;
  }

  if(!SHEET_WEB_APP_URL){
    setSyncBadge(localOk ? 'local' : 'err');
    return localOk;
  }

  try{
    const resp = await fetch(SHEET_WEB_APP_URL, {
      method:'POST',
      body: JSON.stringify(leaves)
    });
    if(!resp.ok){
      const bodyText = await resp.text().catch(()=> '');
      throw new Error(`HTTP ${resp.status} ${resp.statusText} — ${bodyText.slice(0,150)}`);
    }
    await parseSheetResponse(resp); // ตรวจว่าตอบกลับเป็น JSON จริง ไม่ใช่หน้า HTML แทรก
    setSyncBadge('ok', '');
    return true;
  }catch(e){
    console.error('บันทึกขึ้น Google Sheet ไม่สำเร็จ (ข้อมูลยังอยู่ในเครื่อง)', e);
    setSyncBadge('err', String(e.message || e));
    return localOk;
  }
}

function downloadJSON(filename, dataObj){
  const blob = new Blob([JSON.stringify(dataObj, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('btn-export').addEventListener('click', ()=>{
  const today = toISO(new Date());
  downloadJSON(`leave-data-backup-${today}.json`, leaves);
});

document.getElementById('btn-import-trigger').addEventListener('click', ()=>{
  document.getElementById('file-import').click();
});

document.getElementById('file-import').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const imported = JSON.parse(text);
    if(!Array.isArray(imported)) throw new Error('รูปแบบไฟล์ไม่ถูกต้อง');
    const proceed = confirm(`พบข้อมูล ${imported.length} รายการในไฟล์สำรอง ต้องการรวมเข้ากับข้อมูลปัจจุบัน (${leaves.length} รายการ) หรือไม่?`);
    if(!proceed){ e.target.value=''; return; }
    const existingIds = new Set(leaves.map(l=>String(l.id)));
    imported.forEach(l=>{
      if(!existingIds.has(String(l.id))){
        leaves.push(l);
        existingIds.add(String(l.id));
      }
    });
    await saveLeaves();
    renderMonths();
    renderList();
    alert('นำเข้าข้อมูลเรียบร้อยแล้ว');
  }catch(err){
    alert('ไม่สามารถนำเข้าไฟล์นี้ได้: ' + err.message);
  }
  e.target.value = '';
});

function leavesOnDate(iso){
  const d = parseISO(iso);
  return leaves.filter(l => parseISO(l.start) <= d && d <= parseISO(l.end));
}

function periodSuffix(period){
  if(!period || period === 'เต็มวัน') return '';
  return ` (${period})`;
}

function buildMonthCells(y, m){
  const firstDay = new Date(y,m,1);
  const startOffset = firstDay.getDay(); // 0=Sun
  const daysInMonth = new Date(y,m+1,0).getDate();
  const daysInPrevMonth = new Date(y,m,0).getDate();

  const cells = [];
  for(let i=startOffset-1;i>=0;i--){
    cells.push({date:new Date(y,m-1,daysInPrevMonth-i), outside:true});
  }
  for(let d=1; d<=daysInMonth; d++){
    cells.push({date:new Date(y,m,d), outside:false});
  }
  while(cells.length % 7 !== 0){
    const last = cells[cells.length-1].date;
    const next = new Date(last);
    next.setDate(next.getDate()+1);
    cells.push({date:next, outside:true});
  }
  return cells;
}

function renderMonths(){
  const y = viewDate.getFullYear();
  const m = viewDate.getMonth();
  document.getElementById('range-title').textContent = `${THAI_MONTHS[m]} ${y+543}`;

  const todayISO = toISO(new Date());
  const row = document.getElementById('months-row');
  row.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'month-card';

  const wk = document.createElement('div');
  wk.className = 'm-weekdays';
  wk.innerHTML = THAI_DAYS.map((dn,i)=>
    `<div class="${i===0?'sun':i===6?'sat':''}">${dn}</div>`
  ).join('');
  card.appendChild(wk);

  const grid = document.createElement('div');
  grid.className = 'm-grid';

  buildMonthCells(y,m).forEach(cell=>{
    const iso = toISO(cell.date);
    const dow = cell.date.getDay();
    const dayLeaves = leavesOnDate(iso);
    const holidayName = HOLIDAYS[iso];

    const div = document.createElement('div');
    let cls = 'm-day';
    if(cell.outside) cls += ' outside';
    if(iso===todayISO) cls += ' today';
    if(holidayName) cls += ' holiday';
    if(dow===0) cls += ' sunday';
    if(dow===6) cls += ' saturday';
    div.className = cls;
    div.title = holidayName ? holidayName : '';

    let entriesHtml = '';
    const maxShow = 4;
    dayLeaves.slice(0,maxShow).forEach(l=>{
      const c = PEOPLE[l.name] || {dot:'#999'};
      const suffix = periodSuffix(l.period);
      entriesHtml += `<div class="m-entry" title="${l.name}${suffix} - ${l.type}">
        <span class="dot-inline" style="background:${c.dot}"></span>
        <span class="m-entry-name">${l.name}${suffix}</span>
      </div>`;
    });
    let moreHtml = '';
    if(dayLeaves.length > maxShow){
      moreHtml = `<div class="m-more">+${dayLeaves.length-maxShow} เพิ่มเติม</div>`;
    }

    div.innerHTML = `<div class="m-num">${cell.date.getDate()}</div><div class="m-entries">${entriesHtml}${moreHtml}</div>`;
    div.addEventListener('click', ()=> showDayDetail(iso));
    grid.appendChild(div);
  });

  card.appendChild(grid);
  row.appendChild(card);
}

function showDayDetail(iso){
  selectedDayISO = iso;
  const dayLeaves = leavesOnDate(iso);
  const box = document.getElementById('day-detail');
  const d = parseISO(iso);
  const holidayName = HOLIDAYS[iso];
  document.getElementById('detail-title').textContent =
    `วันที่ ${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear()+543}` +
    (holidayName ? ` · ${holidayName}` : '');

  const listEl = document.getElementById('detail-list');
  if(dayLeaves.length === 0){
    listEl.innerHTML = `<div class="empty-note">ไม่มีใครลาในวันนี้</div>`;
  } else {
    listEl.innerHTML = dayLeaves.map(l=>{
      const c = PEOPLE[l.name] || {dot:'#999'};
      return `<div class="detail-entry">
        <span class="dot" style="background:${c.dot}"></span>
        <div class="info"><strong>${l.name}</strong> · ${l.type} · ${l.period || 'เต็มวัน'}${l.note ? ' · '+escapeHtml(l.note) : ''}
        <div style="color:#6E7A70;font-size:11.5px;">${l.start} ถึง ${l.end}</div></div>
        <button class="del" data-id="${l.id}" title="ลบ">✕</button>
      </div>`;
    }).join('');
  }
  box.style.display = 'block';

  listEl.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      const id = e.currentTarget.dataset.id;
      leaves = leaves.filter(l => String(l.id) !== String(id));
      await saveLeaves();
      renderMonths();
      renderList();
      showDayDetail(selectedDayISO);
    });
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderList(){
  const wrap = document.getElementById('list-wrap');
  if(leaves.length === 0){
    wrap.innerHTML = `<div class="empty-note">ยังไม่มีข้อมูลวันลา เริ่มเพิ่มได้จากฟอร์มด้านซ้าย</div>`;
    return;
  }
  const sorted = [...leaves].sort((a,b)=> parseISO(a.start) - parseISO(b.start));
  wrap.innerHTML = `<table>
    <thead><tr><th>ชื่อ</th><th>ประเภท</th><th>ช่วงเวลา</th><th>วันที่</th><th>หมายเหตุ</th><th></th></tr></thead>
    <tbody>
      ${sorted.map(l=>{
        const c = PEOPLE[l.name] || {dot:'#999'};
        return `<tr>
          <td><span class="name-chip"><span class="dot" style="background:${c.dot}"></span>${l.name}</span></td>
          <td>${l.type}</td>
          <td>${l.period || 'เต็มวัน'}</td>
          <td>${l.start}${l.start!==l.end ? ' – '+l.end : ''}</td>
          <td>${l.note ? escapeHtml(l.note) : '-'}</td>
          <td><button class="del-row" data-id="${l.id}" title="ลบ">✕</button></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  wrap.querySelectorAll('.del-row').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      const id = e.currentTarget.dataset.id;
      leaves = leaves.filter(l => String(l.id) !== String(id));
      await saveLeaves();
      renderMonths();
      renderList();
      if(selectedDayISO) showDayDetail(selectedDayISO);
    });
  });
}

document.getElementById('btn-save').addEventListener('click', async ()=>{
  const names = getSelectedNames();
  const type = document.getElementById('f-type').value;
  const note = document.getElementById('f-note').value.trim();
  const errEl = document.getElementById('err');

  const periodSel = document.getElementById('f-period').value;
  const periodCustom = document.getElementById('f-period-custom').value.trim();
  let period = periodSel === 'custom' ? periodCustom : periodSel;

  if(names.length === 0){
    errEl.textContent = 'กรุณาเลือกอย่างน้อย 1 คน';
    errEl.style.display = 'block';
    return;
  }
  if(periodSel === 'custom' && !periodCustom){
    errEl.textContent = 'กรุณาระบุช่วงเวลาที่ต้องการ';
    errEl.style.display = 'block';
    return;
  }

  // build list of {start,end} ranges based on selected date mode
  let ranges = [];
  let jumpDate = null;

  if(dateMode === 'single'){
    const d = document.getElementById('f-single-date').value;
    if(!d){
      errEl.textContent = 'กรุณาเลือกวันที่ลา';
      errEl.style.display = 'block';
      return;
    }
    ranges = [{start:d, end:d}];
    jumpDate = d;

  } else if(dateMode === 'range'){
    const start = document.getElementById('f-start').value;
    const end = document.getElementById('f-end').value;
    if(!start || !end){
      errEl.textContent = 'กรุณาเลือกวันที่เริ่มและวันที่สิ้นสุด';
      errEl.style.display = 'block';
      return;
    }
    if(parseISO(start) > parseISO(end)){
      errEl.textContent = 'วันที่สิ้นสุดต้องไม่ก่อนวันที่เริ่ม';
      errEl.style.display = 'block';
      return;
    }
    ranges = [{start, end}];
    jumpDate = start;

  } else if(dateMode === 'multi'){
    if(multiDates.length === 0){
      errEl.textContent = 'กรุณาเพิ่มอย่างน้อย 1 วันที่';
      errEl.style.display = 'block';
      return;
    }
    ranges = multiDates.map(d => ({start:d, end:d}));
    jumpDate = multiDates[0];
  }

  errEl.style.display = 'none';

  names.forEach(name=>{
    ranges.forEach(r=>{
      leaves.push({
        id: Date.now() + Math.random().toString(16).slice(2),
        name, start:r.start, end:r.end, type, period, note
      });
    });
  });
  await saveLeaves();

  // reset form
  document.querySelectorAll('#name-checks input').forEach(cb=>{
    cb.checked = false;
    cb.closest('.name-check').classList.remove('checked');
  });
  document.getElementById('f-single-date').value = '';
  document.getElementById('f-start').value = '';
  document.getElementById('f-end').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-period').value = 'เต็มวัน';
  document.getElementById('f-period-custom').value = '';
  document.getElementById('f-period-custom').style.display = 'none';
  multiDates = [];
  renderDateChips();

  if(jumpDate){
    viewDate = new Date(parseISO(jumpDate).getFullYear(), parseISO(jumpDate).getMonth(), 1);
    renderMonths();
    showDayDetail(jumpDate);
  }
  renderList();
});

document.getElementById('prev-month').addEventListener('click', ()=>{
  viewDate.setMonth(viewDate.getMonth()-1);
  renderMonths();
});
document.getElementById('next-month').addEventListener('click', ()=>{
  viewDate.setMonth(viewDate.getMonth()+1);
  renderMonths();
});
document.getElementById('today-btn').addEventListener('click', ()=>{
  viewDate = new Date();
  viewDate.setDate(1);
  renderMonths();
  showDayDetail(toISO(new Date()));
});

(async function init(){
  populateNameSelect();
  setupModeTabs();
  setupPeriodField();
  renderDateChips();
  renderLegend();
  await loadLeaves();
  renderMonths();
  renderList();
})();
</script>
